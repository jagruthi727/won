<html>
    <head>
        <title>Quiz Categorise</title>
      <style>
        body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background: radial-gradient(circle at top,
#1b263b,
#0d1b2a,
#020617);
  color: #E5E7EB;
}

/* HEADER */

.header {
  text-align: center;
  padding: 30px;
}

.header h1 {
  font-family: 'Orbitron';
  font-size: 28px;
  background: linear-gradient(90deg,#22D3EE,#8B5CF6);
  -webkit-background-clip: text;
  color: transparent;
}

.header p {
  color: #9CA3AF;
}

/* GRID */

.r1{
  display: flex;
  justify-content: space-evenly;
}
.r2{
  display: flex;
  justify-content: space-evenly;
  margin-top: 40px;
}

/* CARD */

.card {
  height: 200px;
  width: 400px;
  background: #1E293B;
  border: 1px solid #334155;
  border-radius: 16px;
  padding-top: 60px;
  transition: 0.3s;
  text-align: center;
}

.card:hover {
  transform: translateY(-6px);
  box-shadow: 0 10px 25px rgba(0,0,0,0.4);
  border: 1px solid #22D3EE;
}

.card h2 {
  margin: 0;
}

.card p {
  margin: 10px 0;
  color: #9CA3AF;
}

/* DIFFICULTY */

.easy { color: #22C55E; }
.medium { color: #FACC15; }
.hard { color: #EF4444; }

/* BUTTON */

button {
  background: #8B5CF6;
  color: white;
  padding: 10px 15px;
  border: none;
  border-radius: 10px;
  cursor: pointer;
}

button:hover {
  background: #7C3AED;
  box-shadow: 0 0 12px #8B5CF6;
}


 
      </style>
    </head>

    <body>
        <div class="header">
  <h1>Explore Quiz Categories</h1>
  <p>Choose a category and start testing your skills</p>
</div>

  <div class="grid">
      <div class="r1">
        <div class="card">
          <h2>Programming</h2>
          <p>Questions: 20</p>
          <p>Difficulty: <span class="medium">Medium</span></p>
          <button>Start Quiz</button>
        </div>
        <div class="card">
          <h2>Aptitude</h2>
          <p>Questions: 15</p>
          <p>Difficulty: <span class="easy">Easy</span></p>
          <button>Start Quiz</button>
        </div>
      </div>
      <div class="r2">
        <div class="card">
          <h2>General Knowledge</h2>
          <p>Questions: 25</p>
          <p>Difficulty: <span class="medium">Medium</span></p>
          <button>Start Quiz</button>
        </div>
         <div class="card">
          <h2>Mathematics</h2>
          <p>Questions: 18</p>
          <p>Difficulty: <span class="hard">Hard</span></p>
          <button>Start Quiz</button>
        </div>

      </div>



  </div>
</body>
</html>
