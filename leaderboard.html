<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Leaderboard</title>
  <style>
    body {
  margin: 0;
  font-family: 'Poppins', sans-serif;
  background:
  radial-gradient(circle at 20% 30%, #1b263b,transparent),
  radial-gradient(circle at 80% 70%,#0d1b2a,transparent),
  #020617;
  color: #E5E7EB;
}

/* NAVBAR */
.navbar {
  display: flex;
  justify-content: space-between;
  padding: 15px 30px;
  background: #14192f;
  border-bottom: 1px solid #334155;
}

.logo {
  font-size:20px;
  background: linear-gradient(90deg,#22D3EE,#8B5CF6);
  -webkit-background-clip: text;
  color: transparent;
}

.nav-links a{
text-decoration:none;
color:white;
font-size:16px;
position:relative;
}
.nav-links a::after{
content:"";
position:absolute;
width:0%;
height:2px;
left:0;
bottom:-5px;
background:#4cc9f0;
transition:0.3s;
}
.nav-links a:hover::after{
width:100%;
}
/* TITLE */
.title {
  text-align: center;
  margin-top: 20px;
}
/* TABS */
.tabs {
  text-align: center;
  margin: 20px;
}
.tab {
  background: none;
  border: none;
  color: #9CA3AF;
  margin: 10px;
  font-size: 16px;
  cursor: pointer;
}
.tab.active {
  color: #8B5CF6;
  border-bottom: 2px solid #8B5CF6;
}
/* FILTERS */
.filters {
  text-align: center;
}
input, select {
  margin: 10px;
  padding: 10px;
  background: #1E293B;
  border: 1px solid #334155;
  color: white;
  border-radius: 8px;
}
/* TOP 3 */
.top3 {
  display: flex;
  justify-content: center;
  margin: 30px;
}
.card {
  background: #1E293B;
  padding: 20px;
  margin: 10px;
  border-radius: 15px;
  text-align: center;
  width: 120px;
}
.first { box-shadow: 0 0 10px #FACC15; }
.second { box-shadow: 0 0 10px #9CA3AF; }
.third { box-shadow: 0 0 10px #c64d1d; }
/* TABLE */
table {
  width: 80%;
  margin: auto;
  border-collapse: collapse;
  background: #1E293B;
}
th {
  background: #0F172A;
  color: #22D3EE;
  padding: 12px;
}
td {
  padding: 12px;
  text-align: center;
  border-bottom: 1px solid #334155;
}
tr:hover {
  background: #334155;
}
/* FOOTER */
.footer {
 border-top: 1px solid #334155;
  margin-top: 40px;
  padding-top: 20px;
  background: #14192f;
  text-align: center;
  margin: 30px;
  color: #9CA3AF;
}
  </style>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500&family=Poppins:wght@300;400;500&display=swap" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
  <div class="logo">SkillRank</div>
  <div class="nav-links">
    <a href="#">Dashboard</a>
    <a href="#">Leaderboard</a>
    <a href="#">Profile</a>
  </div>
</div>

<!-- TITLE -->
<h1 class="title">Leaderboard</h1>

<!-- TABS -->
<div class="tabs">
  <button class="tab active">Daily</button>
  <button class="tab">Weekly</button>
  <button class="tab">Overall</button>
</div>

<!-- FILTERS -->
<div class="filters">
  <input type="text" id="search" placeholder="Search Username...">

  <select id="category">
    <option value="all">All Categories</option>
    <option value="Programming">Programming</option>
    <option value="Aptitude">Aptitude</option>
    <option value="Mathematics">Mathematics</option>
    <option value="General">General Knowledge</option>
  </select>
</div>

<!-- TOP 3 -->
<div class="top3">
  <div class="card second">
    <p>Sam</p>
    <span>950</span>
  </div>

  <div class="card first">
    <p>Alex</p>
    <span>980</span>
  </div>

  <div class="card third">
    <p>Mia</p>
    <span>920</span>
  </div>
</div>

<!-- TABLE -->
<table id="leaderboardTable">
  <thead>
    <tr>
      <th>Rank</th>
      <th>Username</th>
      <th>Score</th>
      <th>Quizzes</th>
      <th>Category</th>
    </tr>
  </thead>

  <tbody>
    <tr>
      <td class="rank-1">1</td>
      <td>Alex</td>
      <td>980</td>
      <td>25</td>
      <td>Programming</td>
    </tr>
    <tr>
      <td class="rank-2">2</td>
      <td>Sam</td>
      <td>950</td>
      <td>22</td>
      <td>Aptitude</td>
    </tr>
    <tr>
      <td class="rank-3">3</td>
      <td>Mia</td>
      <td>920</td>
      <td>20</td>
      <td>Mathematics</td>
    </tr>
    <tr>
      <td>4</td>
      <td>John</td>
      <td>890</td>
      <td>18</td>
      <td>Programming</td>
    </tr>
    <tr>
      <td>5</td>
      <td>Priya</td>
      <td>870</td>
      <td>17</td>
      <td>Aptitude</td>
    </tr>
  </tbody>
</table>

<!-- FOOTER -->
<div class="footer">
  © 2026 SkillRank
</div>

<script src="leaderboard.js"></script>

</body>
</html>
