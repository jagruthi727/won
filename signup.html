<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SkillRank - Sign Up</title>
<style>
  *{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:
radial-gradient(circle at 20% 30%, #1b263b, transparent),
radial-gradient(circle at 80% 70%, #0d1b2a, transparent),
#020617;

color:white;

min-height:100vh;

}


/* NAVBAR */

.navbar{

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 60px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(10px);

border-radius:40px;
margin:20px;

}

.logo{

font-size:24px;
font-weight:600;
color:#4cc9f0;

}

.logo span{

color:#9d4edd;

}

.nav-links{

list-style:none;
display:flex;

}

.nav-links li{

margin-left:30px;

}

.nav-links a{

text-decoration:none;
color:white;
font-size:16px;
position:relative;

}

.nav-links a::after{

content:"";
position:absolute;

width:0%;
height:2px;

left:0;
bottom:-5px;

background:#4cc9f0;

transition:0.3s;

}

.nav-links a:hover::after{

width:100%;

}


/* SIGNUP CONTAINER */

.signup-container{

display:flex;
justify-content:center;
align-items:center;

min-height:75vh;

}


/* SIGNUP CARD */

.signup-card{

width:430px;

padding:40px;

border-radius:25px;

background:rgba(255,255,255,0.08);

backdrop-filter:blur(18px);

border:1px solid rgba(255,255,255,0.15);

box-shadow:0 20px 40px rgba(0,0,0,0.5);

text-align:center;

animation:fadeIn 1s ease;

}

.signup-card h2{

margin-bottom:25px;
font-weight:500;

}


/* INPUT FIELDS */

.input-group input{

width:100%;

padding:14px;

margin-bottom:18px;

border-radius:12px;

border:none;

background:rgba(255,255,255,0.08);

color:white;

outline:none;

font-size:15px;

}

.input-group input:focus{

border:1px solid #4cc9f0;

box-shadow:0 0 8px rgba(76,201,240,0.6);

}


/* REGISTER BUTTON */

.register-btn{

width:170px;

padding:12px;

border:none;

border-radius:30px;

background:linear-gradient(135deg,#6a5acd,#9d4edd);

color:white;

font-size:16px;

cursor:pointer;

transition:0.3s;

margin-top:10px;

}

.register-btn:hover{

transform:translateY(-3px);

box-shadow:0 10px 20px rgba(0,0,0,0.5);

}


/* LOGIN LINK */

.login-link{

margin-top:20px;

color:#cbd5e1;

}

.login-link a{

color:#4cc9f0;
text-decoration:none;

}

.login-link a:hover{

color:#9d4edd;

}


/* FOOTER */

footer{

margin-top:40px;

padding:20px;

text-align:center;

color:#94a3b8;

border-top:1px solid rgba(255,255,255,0.1);

}


/* ANIMATION */

@keyframes fadeIn{

from{
opacity:0;
transform:translateY(40px);
}

to{
opacity:1;
transform:translateY(0);
}

}
</style>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

</head>

<body>

<!-- NAVBAR -->

<nav class="navbar">

<div class="logo">
Skill<span>Rank</span>
</div>

<ul class="nav-links">

<li><a href="home.html">Home</a></li>
<li><a href="login.html">Login</a></li>
<li><a href="signup.html">SignUp</a></li>
<li><a href="#">Leaderboard</a></li>
<li><a href="#">About</a></li>

</ul>

</nav>


<!-- SIGNUP SECTION -->

<div class="signup-container">

<div class="signup-card">

<h2>Create Account</h2>

<form>

<div class="input-group">
<input type="text" placeholder="Username" required>
</div>

<div class="input-group">
<input type="email" placeholder="Email" required>
</div>

<div class="input-group">
<input type="password" placeholder="Password" required>
</div>

<div class="input-group">
<input type="password" placeholder="Confirm Password" required>
</div>

<button class="register-btn">Register</button>

</form>

<p class="login-link">
Already have an account ?
<a href="login.html">Login</a>
</p>

</div>

</div>


<!-- FOOTER -->

<footer>

<p>© 2026 SkillRank | Built for Competitive Learning</p>

</footer>

</body>
</html>
